---
- name: Deploy SeriesApp
  hosts: seriesapp_servers
  become: true

  vars:
    app_dir: /opt/seriesapp
    dockerhub_username: "franciscovelhinho99"
    image_tag: "latest"

  tasks:

    - name: Remover repositorio Jenkins legado (se existir)
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/jenkins.list
        - /etc/apt/sources.list.d/jenkins.sources

    - name: Remover entradas Docker antigas de /etc/apt/sources.list
      lineinfile:
        path: /etc/apt/sources.list
        regexp: '^deb .*download\.docker\.com/linux/ubuntu.*$'
        state: absent

    - name: Remover ficheiros de repositorio Docker legados em sources.list.d
      shell: |
        set -e
        find /etc/apt/sources.list.d -maxdepth 1 -type f \( -name '*.list' -o -name '*.sources' \) -print0 \
          | xargs -0 -r grep -l 'download.docker.com/linux/ubuntu' \
          | xargs -r rm -f
      args:
        executable: /bin/bash

    # ── Instalação do Docker ──────────────────────────────────────────────────

    - name: Instalar pacotes necessarios
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Remover repositorio Docker legado (se existir)
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/docker.list
        - /etc/apt/sources.list.d/docker.sources

    - name: Criar pasta para keyrings do APT
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Guardar chave GPG do Docker no keyring
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'
        force: true

    - name: Adicionar repositorio Docker
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present

    - name: Instalar Docker Engine e plugin Compose
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Iniciar e activar o servico Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    # ── Deploy da Aplicacao ───────────────────────────────────────────────────

    - name: Criar directorio da aplicacao
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Copiar docker-compose de producao
      copy:
        src: docker-compose.prod.yml
        dest: "{{ app_dir }}/docker-compose.yml"

    - name: Puxar imagens mais recentes do Docker Hub
      command: docker pull "{{ item }}"
      loop:
        - "{{ dockerhub_username }}/seriesapp-backend:{{ image_tag }}"
        - "{{ dockerhub_username }}/seriesapp-frontend:{{ image_tag }}"
        - "postgres:16"

    - name: Arrancar/actualizar aplicacao com Docker Compose
      shell: |
        cd {{ app_dir }}
        BACKEND_IMAGE={{ dockerhub_username }}/seriesapp-backend:{{ image_tag }} \
        FRONTEND_IMAGE={{ dockerhub_username }}/seriesapp-frontend:{{ image_tag }} \
        docker compose up -d --remove-orphans
      args:
        executable: /bin/bash
