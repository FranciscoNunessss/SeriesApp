---
- name: Deploy SeriesApp
  hosts: seriesapp_servers
  become: true

  vars:
    app_dir: /opt/seriesapp
    dockerhub_username: "SEU_USERNAME_DOCKERHUB"
    image_tag: "latest"

  tasks:

    # ── Instalação do Docker ──────────────────────────────────────────────────

    - name: Instalar pacotes necessarios
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Adicionar chave GPG do Docker
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Adicionar repositorio Docker
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Instalar Docker Engine e plugin Compose
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Iniciar e activar o servico Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    # ── Deploy da Aplicacao ───────────────────────────────────────────────────

    - name: Criar directorio da aplicacao
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Copiar docker-compose de producao
      copy:
        src: docker-compose.prod.yml
        dest: "{{ app_dir }}/docker-compose.yml"

    - name: Puxar imagens mais recentes do Docker Hub
      command: docker pull "{{ item }}"
      loop:
        - "{{ dockerhub_username }}/seriesapp-backend:{{ image_tag }}"
        - "{{ dockerhub_username }}/seriesapp-frontend:{{ image_tag }}"
        - "postgres:16"

    - name: Arrancar/actualizar aplicacao com Docker Compose
      shell: |
        cd {{ app_dir }}
        BACKEND_IMAGE={{ dockerhub_username }}/seriesapp-backend:{{ image_tag }} \
        FRONTEND_IMAGE={{ dockerhub_username }}/seriesapp-frontend:{{ image_tag }} \
        docker compose up -d --remove-orphans
      args:
        executable: /bin/bash
