services:
  db:
    image: postgres:16
    container_name: series_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: series_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    container_name: series_api
    environment:
      PROJECT_NAME: Series Tracking Platform
      VERSION: 1.0.0
      API_V1_STR: /api/v1
      DATABASE_URL: postgresql://postgres:postgres@db:5432/series_db
      DEBUG: "True"
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
